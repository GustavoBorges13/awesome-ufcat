name: 🤖 Atualizador de README

on:
  push:
    branches: [ dev, main ]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Baixando o código
        uses: actions/checkout@v4
        # Removido o 'ref: github.head_ref' pois agora é um evento de push (merge aprovado)

      - name: 🐍 Configurando Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Rodando o script update_readme.py
        run: python scripts/update_readme.py

      - name: 💾 Salvando alterações (se houver)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 bot: atualizando README com as novas pastas"
          commit_user_name: "Awesome UFCAT Bot"
