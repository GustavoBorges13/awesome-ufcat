name: 🧐 Fiscal de Padrão

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch: # gatilho pra rodar pelo browser o action...

jobs:
  check-standards:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Baixando o código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Verificando Pastas e Arquivos
        run: |
          # Checa se foi ativado manualmente ou via PR/Push
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Modo Auditoria Manual: Verificando TODOS os arquivos do repositório..."
            FILES=$(git ls-files)
          else
            FILES=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref || github.event.before }}...HEAD)
          fi
          
          ERRO_PASTA=0
          
          IFS=$'\n'
          for FILE in $FILES; do
            # Ignora arquivos na raiz (como README), docs/ e scripts/
            if [[ "$FILE" != */* ]] || [[ "$FILE" == "docs/"* ]] || [[ "$FILE" == "scripts/"* ]] || [[ "$FILE" == .* ]]; then
              continue
            fi

            # Pega a pasta raiz (Nome da Disciplina) e o Nome do Arquivo
            DISCIPLINA=$(echo "$FILE" | cut -d'/' -f1)
            FILENAME=$(basename "$FILE")

            # REGRA 1 (RIGOROSA): Verifica se a Disciplina existe no scripts/update_readme.py
            if ! grep -q "\"$DISCIPLINA\"" scripts/update_readme.py; then
              echo "::error file=$FILE::A disciplina '$DISCIPLINA' não existe! O nome da pasta deve ser idêntico ao que está no update_readme.py da pasta scripts."
              ERRO_PASTA=1
            fi

            # REGRA 2 (FLEXÍVEL): Avisa sobre o padrão de nomeação do arquivo
            REGEX="^[0-9X]{4}_[1-2X]"
            if [[ ! $FILENAME =~ $REGEX ]]; then
              echo "::warning file=$FILE::O arquivo '$FILENAME' não segue o padrão recomendado (Ex: 2023_1.pdf)."
            fi
          done
          unset IFS
          
          # Se teve erro de PASTA, o bot reprova a ação.
          if [ $ERRO_PASTA -eq 1 ]; then
            echo "❌ Foram encontrados erros nas pastas das disciplinas."
            exit 1
          else
            echo "✅ Validação concluída! Arquivos fora do padrão geraram apenas avisos (warnings)."
          fi
