name: 🧐 Fiscal de Padrão

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  check-filenames:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Baixando o código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Verificando nomes dos arquivos
        run: |
          # Pega os arquivos modificados/adicionados no PR ou Push
          FILES=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref || github.event.before }}...HEAD)
          
          # NOVA REGEX: Garante o começo 'YYYY_S', mas permite hifens, underlines e letras depois.
          REGEX="^[0-9X]{4}_[1-2X][-a-zA-Z0-9_() ]*\.(pdf|jpg|png|jpeg|PDF|JPG|PNG|JPEG)$"
          ERROS=0
          
          IFS=$'\n'
          for FILE in $FILES; do
            if [[ -n "$FILE" && "$FILE" != "docs/"* && "$FILE" != "scripts/"* && "$FILE" != .* ]]; then
              FILENAME=$(basename "$FILE")
              
              # Ignora arquivos de sistema e da raiz se não forem provas
              if [[ "$FILENAME" == "README.md" || "$FILENAME" == "CONTRIBUTING.md" || "$FILENAME" == "LICENSE" || "$FILENAME" == *.py || "$FILENAME" == *.html || "$FILENAME" == *.css || "$FILENAME" == *.js ]]; then
                continue
              fi

              if [[ ! $FILENAME =~ $REGEX ]]; then
                echo "❌ ERRO: O arquivo '$FILENAME' não segue o padrão. (Caminho: $FILE)"
                ERROS=1
              fi
            fi
          done
          unset IFS
          
          if [ $ERROS -eq 1 ]; then
            echo "Por favor, renomeie os arquivos seguindo as regras do CONTRIBUTING.md."
            echo "Exemplos válidos: 2023_1.pdf, 2023_1-pag1.jpg, 2023_1_gabarito_parte_1.jpg"
            exit 1
          else
            echo "✅ Todos os arquivos estão no padrão correto!"
          fi
